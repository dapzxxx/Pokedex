name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download real gradlew
        run: |
          wget -q https://raw.githubusercontent.com/nicklockwood/iCarousel/master/gradlew 2>/dev/null || true
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O gradle.zip
          unzip -q gradle.zip
          mv gradle-8.4/bin/gradle /usr/local/bin/gradle
          chmod +x /usr/local/bin/gradle

      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir .

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
